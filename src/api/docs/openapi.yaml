openapi: 3.0.3
info:
  title: Express API
  description: |
    REST API for posts and users. All responses use the JSend format
    (https://github.com/omniti-labs/jsend) for consistency.
    - success: `{ status: "success", data: ... }`
    - fail: `{ status: "fail", data: { error, details? } }` (4xx)
    - error: `{ status: "error", message, code?, data? }` (5xx)
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Default (overridden at runtime from config)
paths:
  /posts:
    get:
      summary: List all posts
      tags: [Posts]
      responses:
        '200':
          description: Array of posts (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessPostArray'
    post:
      summary: Create a new post
      tags: [Posts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostCreate'
      responses:
        '201':
          description: Created post (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessPost'
        '400':
          description: Validation error (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
  /posts/{id}:
    get:
      summary: Get a post by ID
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The post (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessPost'
        '404':
          description: Post not found (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
    put:
      summary: Update a post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpdate'
      responses:
        '200':
          description: Updated post (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessPost'
        '400':
          description: Validation error (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: Post not found (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
    delete:
      summary: Delete a post
      tags: [Posts]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post deleted (JSend success, data null)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessNull'
        '404':
          description: Post not found (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
  /users:
    get:
      summary: List all users
      tags: [Users]
      responses:
        '200':
          description: Array of users (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessUserArray'
    post:
      summary: Create a new user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: Created user (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessUser'
        '400':
          description: Validation error (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
  /users/{id}:
    get:
      summary: Get a user by ID
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The user (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessUser'
        '404':
          description: User not found (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
    put:
      summary: Update a user
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Updated user (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessUser'
        '400':
          description: Validation error (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: User not found (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
    delete:
      summary: Delete a user
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted (JSend success, data null)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessNull'
        '400':
          description: Cannot delete user with existing posts (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
        '404':
          description: User not found (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
  /users/{id}/posts:
    get:
      summary: Get posts by user ID
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Array of posts by the user (JSend success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendSuccessPostArray'
        '404':
          description: User not found (JSend fail)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSendFail'
components:
  schemas:
    JSendSuccessPostArray:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: array
          items:
            $ref: '#/components/schemas/Post'
    JSendSuccessUserArray:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: array
          items:
            $ref: '#/components/schemas/User'
    JSendSuccessPost:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/Post'
    JSendSuccessUser:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          $ref: '#/components/schemas/User'
    JSendSuccessNull:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [success]
        data:
          type: 'null'
    JSendFail:
      type: object
      required: [status, data]
      properties:
        status:
          type: string
          enum: [fail]
        data:
          type: object
          properties:
            error:
              type: string
            details:
              type: array
    Post:
      type: object
      required: [id, title, body, userId, createdAt]
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
    PostCreate:
      type: object
      required: [title, body, userId]
      properties:
        title:
          type: string
        body:
          type: string
        userId:
          type: string
    PostUpdate:
      type: object
      required: [id, title, body, userId]
      description: createdAt is server-managed and cannot be updated
      properties:
        id:
          type: string
        title:
          type: string
        body:
          type: string
        userId:
          type: string
    User:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
    UserCreate:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
